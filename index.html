<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Startup Explorer - Dashboard</title>
</head>
<body>
  <header>
    <nav class="bg-[#10100D] text-white flex items-center justify-between px-20 py-4 border-b-[1.5px] border-[rgba(255,255,255,0.1)]">
      <div class="navLeft">
        <div class="logo">
          <h1 class="text-[var(--accent)] font-[D] italic font-bold text-[27px]">Startup Explorer</h1>
        </div>
      </div>

      <div class="navMiddle">
        <div>
          <ul class="flex gap-8 font-secondary font-light -translate-x-[60px]">
            <li><a class="flex gap-2" href="#"><span><i class="fa-brands fa-space-awesome"></i></span>Explore</a></li>
            <li><a class="flex gap-2" href="#"><span><i class="fa-solid  fa-bookmark"></i></span>Saved</a></li>
            <li><a class="flex gap-2" href="#"><span><i class="fa-solid fa-chart-line"></i></span>Trends</a></li>
            <li><a class="flex gap-2" href="#"><span><i class="fa-solid fa-scale-balanced"></i></span>Compare</a></li>
          </ul>
        </div>
      </div>

      <div class="navRight flex items-center gap-6 text-[20px]">
        <div id="theme-toggle" class="theme">
          <a href="">
            <i class="fas fa-moon"></i>
          </a>
        </div>
        <div class="profile">
        <a href="">
          <i class="fa-solid fa-circle-user"></i>
        </a>
        </div>
      </div>
    </nav>
  </header>

</html>
