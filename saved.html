<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Saved Startups - Startup Explorer</title>
</head>
<body class="font-secondary">
  <header>
    <nav class="bg-[#10100D] text-white flex items-center justify-between px-20 py-4 border-b-[1.5px] border-[rgba(255,255,255,0.1)] sticky top-0 z-50">
      <div class="navLeft">
        <h1 class="text-[var(--accent)] italic font-bold text-[27px]" style="font-family:'TASA Orbiter',sans-serif;">
          Startup Explorer
        </h1>
      </div>
      <div class="navMiddle">
        <ul class="flex gap-8 font-light" style="font-family:'Geist Mono',monospace;">
          <li><a class="flex gap-2 items-center text-white/50 hover:text-white transition-colors text-sm" href="dashboard.html">
            <i class="fa-solid fa-compass"></i>Explore
          </a></li>
          <li><a class="flex gap-2 items-center text-white active transition-colors text-sm" href="#">
            <i class="fa-solid fa-bookmark"></i>Saved
          </a></li>
        </ul>
      </div>
      <div class="navRight flex items-center gap-5 text-[18px]">
        <div id="theme-toggle" class="cursor-pointer text-white/70 hover:text-white transition-colors">
          <i class="fas fa-moon"></i>
        </div>
        <div class="flex items-center gap-2.5 cursor-pointer group">
          <div class="w-8 h-8 rounded-full bg-[#FF3800]/20 border border-[#FF3800]/40 flex items-center justify-center text-[#ff6a20] text-xs font-bold group-hover:border-[#FF3800]/70 transition-colors">TS</div>
          <span class="text-sm text-white/75 group-hover:text-white transition-colors">Tushar</span>
        </div>
      </div>
    </nav>
  </header>

  <main class="max-w-[1400px] mx-auto px-20 py-12">
    <div class="mb-10">
      <h1 class="text-4xl font-bold mb-2">Your Saved Startups</h1>
      <p class="text-gray-500">You have <span id="saved-count">0</span> startups bookmarked.</p>
    </div>

    <div id="no-saved" class="hidden flex flex-col items-center gap-6 py-20 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
      <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center text-gray-300 text-3xl">
        <i class="fa-regular fa-bookmark"></i>
      </div>
      <div class="text-center">
        <h3 class="text-lg font-bold text-gray-900">No saved startups yet</h3>
        <p class="text-gray-500 text-sm">Explore the dashboard and bookmark startups you like.</p>
      </div>
      <a href="dashboard.html" class="bg-[#FF3800] text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-[#ff5520] transition-colors">Browse Startups</a>
    </div>

    <div id="saved-list" class="flex flex-col gap-4">
    </div>
  </main>

  <script type="module" src="./js/saved.js"></script>
</body>
</html>
